name: Package Preview

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build preview zip
        uses: BigWigsMods/packager@v2
        with:
          args: -d -g retail -r preview-package

      - name: Select preview zip
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t zips < <(find preview-package -maxdepth 1 -type f -name 'CooldownCompanion*.zip' | sort)
          if [ "${#zips[@]}" -ne 1 ]; then
            echo "Expected exactly one CooldownCompanion preview zip, found ${#zips[@]}."
            exit 1
          fi
          echo "preview_zip=${zips[0]}" >> "$GITHUB_ENV"

      - name: Make preview zip downloadable
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.preview_zip }}
          if-no-files-found: error
          archive: false
